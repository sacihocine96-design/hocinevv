<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knotique | Commande Personnalisée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #F5F5DC; /* Beige */
        }
        h1, h2, h3, .brand-font {
            font-family: 'Playfair Display', serif;
        }
        .crochet-pattern {
            background-color: #F5F5DC;
            background-image: radial-gradient(#d1bfa7 0.5px, transparent 0.5px);
            background-size: 20px 20px;
        }
        .soft-shadow {
            box-shadow: 0 10px 30px -5px rgba(93, 64, 55, 0.15);
        }
    </style>
</head>
<body class="crochet-pattern min-h-screen flex flex-col text-stone-800">

    <!-- Header / Brand -->
    <header class="py-10 text-center">
        <div class="inline-block bg-white p-3 rounded-full mb-4 soft-shadow">
            <i data-lucide="flower" class="text-amber-900 w-8 h-8"></i>
        </div>
        <h1 class="text-4xl font-bold brand-font text-stone-900 tracking-wide uppercase">Knotique</h1>
        <p class="text-amber-900 italic mt-2 tracking-widest font-light">L'art du crochet fait main à Oran</p>
    </header>

    <!-- Main Content: Order Form -->
    <main class="flex-grow flex items-center justify-center px-4 pb-20">
        <div class="max-w-2xl w-full bg-white rounded-[2.5rem] p-8 md:p-12 soft-shadow border border-stone-100">
            <div class="text-center mb-10">
                <h2 class="text-2xl font-bold text-stone-800 mb-2 uppercase tracking-tighter">Passer une Commande</h2>
                <div class="w-12 h-1 bg-amber-900 mx-auto rounded-full mb-4"></div>
                <p class="text-stone-500 text-sm">Décrivez votre projet et je lui donnerai vie avec mes fils.</p>
            </div>

            <form id="orderForm" class="space-y-6">
                <!-- Nom -->
                <div>
                    <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-3 ml-1">Nom et Prénom</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-stone-400">
                            <i data-lucide="user" class="w-4 h-4"></i>
                        </span>
                        <input type="text" id="clientName" placeholder="Ex: Sarah Toumi" required
                            class="w-full pl-11 pr-4 py-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none transition duration-300 focus:border-amber-900 focus:bg-white text-stone-700">
                    </div>
                </div>

                <!-- Type de commande -->
                <div>
                    <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-3 ml-1">Type de Création</label>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="cursor-pointer group">
                            <input type="radio" name="order_type" value="Amigurumi" class="hidden peer" checked>
                            <div class="px-4 py-3 text-center rounded-xl border border-stone-200 bg-stone-50 text-stone-600 peer-checked:bg-amber-900 peer-checked:text-white peer-checked:border-amber-900 transition-all duration-300">
                                <span class="text-xs font-semibold uppercase tracking-tight">Amigurumi</span>
                            </div>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="radio" name="order_type" value="Accessoires" class="hidden peer">
                            <div class="px-4 py-3 text-center rounded-xl border border-stone-200 bg-stone-50 text-stone-600 peer-checked:bg-amber-900 peer-checked:text-white peer-checked:border-amber-900 transition-all duration-300">
                                <span class="text-xs font-semibold uppercase tracking-tight">Accessoires</span>
                            </div>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="radio" name="order_type" value="Vêtements" class="hidden peer">
                            <div class="px-4 py-3 text-center rounded-xl border border-stone-200 bg-stone-50 text-stone-600 peer-checked:bg-amber-900 peer-checked:text-white peer-checked:border-amber-900 transition-all duration-300">
                                <span class="text-xs font-semibold uppercase tracking-tight">Vêtements</span>
                            </div>
                        </label>
                        <label class="cursor-pointer group">
                            <input type="radio" name="order_type" value="Déco Maison" class="hidden peer">
                            <div class="px-4 py-3 text-center rounded-xl border border-stone-200 bg-stone-50 text-stone-600 peer-checked:bg-amber-900 peer-checked:text-white peer-checked:border-amber-900 transition-all duration-300">
                                <span class="text-xs font-semibold uppercase tracking-tight">Déco Maison</span>
                            </div>
                        </label>
                    </div>
                </div>

                <!-- Description -->
                <div>
                    <label class="block text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-3 ml-1">Détails du projet</label>
                    <div class="relative">
                        <span class="absolute top-4 left-4 text-stone-400">
                            <i data-lucide="message-square" class="w-4 h-4"></i>
                        </span>
                        <textarea id="projectDetails" rows="5" placeholder="Couleurs, dimensions, personnage spécifique..." required
                            class="w-full pl-11 pr-4 py-4 bg-stone-50 border border-stone-200 rounded-2xl outline-none transition duration-300 focus:border-amber-900 focus:bg-white text-stone-700"></textarea>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="group w-full bg-amber-900 text-white py-5 rounded-2xl font-bold uppercase tracking-[0.2em] text-xs hover:bg-stone-800 transition duration-300 soft-shadow flex items-center justify-center gap-2">
                    Envoyer ma demande
                    <i data-lucide="send" class="w-4 h-4 group-hover:translate-x-1 transition-transform"></i>
                </button>
            </form>
        </div>
    </main>

    <!-- Updated Footer with Contact Info -->
    <footer class="py-12 text-center bg-stone-900 text-stone-300">
        <p class="text-[10px] uppercase tracking-[0.3em] mb-8 text-stone-500">Contactez-moi directement</p>
        
        <div class="flex flex-col md:flex-row items-center justify-center gap-6 md:gap-12 px-6">
            <!-- Instagram Link -->
            <a href="https://www.instagram.com/_knotiqueee" target="_blank" class="flex items-center gap-4 hover:text-white transition group">
                <div class="bg-stone-800 p-3 rounded-full group-hover:bg-amber-900 transition border border-stone-700">
                    <i data-lucide="instagram" class="w-5 h-5"></i>
                </div>
                <span class="text-sm font-semibold tracking-wider">@_knotiqueee</span>
            </a>

            <!-- Phone Link -->
            <a href="tel:0563545016" class="flex items-center gap-4 hover:text-white transition group">
                <div class="bg-stone-800 p-3 rounded-full group-hover:bg-amber-900 transition border border-stone-700">
                    <i data-lucide="phone" class="w-5 h-5"></i>
                </div>
                <span class="text-sm font-semibold tracking-wider">0563545016</span>
            </a>
        </div>

        <div class="mt-12 pt-8 border-t border-stone-800 text-[9px] text-stone-600 uppercase tracking-[0.4em]">
            © 2024 Knotique — Oran, Algérie
        </div>
    </footer>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Form Submission Logic to WhatsApp
        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('clientName').value;
            const details = document.getElementById('projectDetails').value;
            const type = document.querySelector('input[name="order_type"]:checked').value;
            const phone = "213563545016"; // Your number in international format

            const message = `Bonjour Knotique! \n\n` +
                            `J'aimerais passer une commande:\n` +
                            `*Nom:* ${name}\n` +
                            `*Type:* ${type}\n` +
                            `*Détails:* ${details}`;

            const encodedMessage = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/${phone}?text=${encodedMessage}`;

            // Open WhatsApp
            window.open(whatsappUrl, '_blank');
        });
    </script>
</body>
</html>
